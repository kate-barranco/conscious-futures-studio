<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — Conscious Futures Studio</title>
<meta name="description" content="Get in touch with Kate Barranco at Conscious Futures Studio — email directly or book a call.">

<style>
:root {
  --navy:   #1A1F5B;
  --purple: #800287;
  --orange: #E75213;
  --cream:  #F5F1E8;
  --ink:    #1a1a1a;
  --rule:   rgba(26,31,91,0.12);
  --f-display: 'Fraunces', Georgia, serif;
  --f-body:    'Inter Tight', system-ui, sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--f-body);
  font-weight: 300;
  font-size: 16px;
  line-height: 1.6;
  color: var(--ink);
  background: var(--cream);
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

main.contact-main {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: calc(6rem + 4vw) 2rem 6rem;
}

.contact-card {
  max-width: 640px;
  width: 100%;
  text-align: center;
}

.contact-eyebrow {
  font-family: var(--f-body);
  font-size: 0.78rem;
  font-weight: 500;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--orange);
  margin-bottom: 1.1rem;
}

.contact-card h1 {
  font-family: var(--f-display);
  font-weight: 600;
  font-size: clamp(2.1rem, 4.5vw, 3rem);
  color: var(--navy);
  line-height: 1.15;
  margin-bottom: 1.4rem;
}

.contact-card p.contact-intro {
  font-family: var(--f-display);
  font-style: italic;
  font-weight: 300;
  font-size: 1.15rem;
  color: rgba(26,26,26,0.78);
  max-width: 480px;
  margin: 0 auto 2.75rem;
  line-height: 1.55;
}

.contact-buttons {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 1rem;
}

.contact-btn {
  display: inline-flex;
  align-items: center;
  gap: 0.6rem;
  font-family: var(--f-body);
  font-size: 0.92rem;
  font-weight: 500;
  letter-spacing: 0.01em;
  text-decoration: none;
  padding: 0.95rem 1.9rem;
  border-radius: 3px;
  transition: transform 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
  white-space: nowrap;
}

.contact-btn.primary {
  background: var(--navy);
  color: var(--cream);
}
.contact-btn.primary:hover {
  background: var(--purple);
  transform: translateY(-1px);
}

.contact-btn.accent {
  background: var(--orange);
  color: var(--cream);
}
.contact-btn.accent:hover {
  background: #c8440e;
  transform: translateY(-1px);
}

.contact-btn .arrow {
  transition: transform 0.2s ease;
}
.contact-btn:hover .arrow {
  transform: translateX(3px);
}

@media (max-width: 480px) {
  .contact-buttons { flex-direction: column; align-items: stretch; }
  .contact-btn { justify-content: center; }
}
</style>
</head>
<body>

<div id="site-nav-placeholder" data-theme="light-bg" data-current="contact"></div>

<main class="contact-main">
  <div class="contact-card">
    <div class="contact-eyebrow">Get in touch</div>
    <h1>Schedule a Chat with Kate</h1>
    <p class="contact-intro">Interested to learn more about Kate's work? Want to meet with her for a specific consultation? Just want to schedule a chit-chat? Email her below.</p>
    <div class="contact-buttons">
      <a href="mailto:kate@conscious-futures.studio" class="contact-btn primary">Email Kate <span class="arrow">→</span></a>
      <a href="https://calendar.google.com/appointments/schedules/AcZssZ0cyJiFy4NcQ5b_gPvfY8OFxMYgnaEjppaQHoI13p6EhT4wJJH6mkX9HPUU93qlpqptEUtYjol4" target="_blank" rel="noopener" class="contact-btn accent">Book a call <span class="arrow">→</span></a>
    </div>
  </div>
</main>

<div id="site-footer-placeholder"></div>

<script src="../shared/nav.js"></script>
<script src="../shared/footer.js"></script>
</body>
</html>
